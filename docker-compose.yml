services:
  postgres: # Em produção, a porta 5432 não precisa ser exposta publicamente.
    image: postgres:15
    container_name: gestao_db
    environment:
      POSTGRES_DB: gestao_fornecedores
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gestao_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao_api
    # Comando para produção: sem reload automático
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    # As variáveis de ambiente devem ser gerenciadas por um arquivo .env no servidor
    # Exemplo: DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gestao_fornecedores
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    # Em produção, o código é copiado para a imagem durante o build, não montado por volume.
    # volumes:
    #   - ./backend:/app
    networks:
      - gestao_network
      

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestao_frontend
    # Comando para produção: serve os arquivos estáticos gerados pelo 'npm run build' (do Vite)
    command: serve -s dist -l 3000
    ports:
      - "3000:3000"
    # A variável de ambiente para a URL da API é lida de um arquivo .env
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    # Em produção, o código é copiado para a imagem, não montado por volume.
    # volumes:
    #   - ./frontend:/app
    networks:
      - gestao_network

volumes:
  postgres_data:

networks:
  gestao_network:
    driver: bridge
