version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gestao_db
    environment:
      POSTGRES_DB: gestao_fornecedores
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gestao_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gestao_fornecedores
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "True"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - gestao_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestao_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - gestao_network

volumes:
  postgres_data:

networks:
  gestao_network:
    driver: bridge
